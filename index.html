<!DOCTYPE html><html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Free Fire Likes Tool</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #22d3ee;
      --accent-2: #38bdf8;
      --danger: #ef4444;
      --success: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(1200px 600px at 10% -10%, rgba(34,211,238,.15), transparent 60%),
                  radial-gradient(800px 400px at 90% 10%, rgba(56,189,248,.12), transparent 60%),
                  var(--bg);
      color: var(--text);
      font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans", Ubuntu, Cantarell, "Helvetica Neue", Arial;
      display: grid; place-items: center; min-height: 100vh; padding: 24px;
    }
    .card {
      width: min(500px, 100%);
      background: var(--card);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      text-align: center;
    }
    h1 { margin: 0 0 6px; font-size: clamp(22px, 4vw, 32px); letter-spacing: .5px; }
    .sub { margin: 0 0 18px; color: var(--muted); font-size: 14px; }
    label { display:block; margin: 14px 0 6px; font-weight: 600; }
    input, button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,0.25);
      background: #0b1220; color: var(--text);
      outline: none;
    }
    input::placeholder { color: #64748b; }
    button {
      cursor: pointer; font-weight: 700; letter-spacing: .3px; margin-top: 14px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #001018; border: none; box-shadow: 0 6px 18px rgba(34,211,238,.25);
      transition: transform .06s ease;
    }
    button:active { transform: translateY(1px); }
    button.loading { background: #0ea5e9; cursor: wait; }/* Popup */
.popup-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center;
  animation: fadeIn 0.3s ease forwards;
}
.popup {
  background: var(--card);
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  max-width: 400px;
  width: 90%;
  text-align: center;
  animation: scaleIn 0.3s ease forwards;
}
.popup h2 { margin-bottom: 10px; }
.popup button {
  margin-top: 14px;
  background: var(--accent);
  color: #001018;
}
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
@keyframes scaleIn { from {transform:scale(0.8);} to {transform:scale(1);} }

  </style>
</head>
<body>
  <main class="card">
    <h1>Free Fire Likes Tool</h1>
    <p class="sub">powered by <strong>sheikh zada</strong></p><form id="likeForm">
  <label for="uid">Enter UID</label>
  <input id="uid" name="uid" type="text" placeholder="e.g. 2955590815" required />
  <button id="submitBtn" type="submit">Submit</button>
</form>

  </main>  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <h2 id="popupTitle">Response</h2>
      <pre id="popupMessage"></pre>
      <button id="closePopup">OK</button>
    </div>
  </div>  <script>
    const form = document.getElementById('likeForm');
    const submitBtn = document.getElementById('submitBtn');
    const popupOverlay = document.getElementById('popupOverlay');
    const popupTitle = document.getElementById('popupTitle');
    const popupMessage = document.getElementById('popupMessage');
    const closePopup = document.getElementById('closePopup');

    function showPopup(title, message, type = 'default') {
      popupTitle.textContent = title;
      popupMessage.textContent = message;
      popupOverlay.style.display = 'flex';
    }

    function closePopupBox() {
      popupOverlay.style.display = 'none';
    }

    closePopup.addEventListener('click', closePopupBox);
    popupOverlay.addEventListener('click', (e) => {
      if (e.target === popupOverlay) closePopupBox();
    });

    function buildUrl(uid) {
      const likes = Math.floor(Math.random() * 6) + 95; // 95-100 likes
      const region = 'PK'; // Default region
      const base = 'https://likes.ffgarena.cloud/api/v2/likes';
      const params = new URLSearchParams({
        uid: uid.trim(),
        amount_of_likes: likes,
        auth: 'trial-7d',
        region: region.trim(),
      });
      return `${base}?${params.toString()}`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const uid = document.getElementById('uid').value.trim();
      if (!uid) return alert('Please enter a UID');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Loading...';
      submitBtn.classList.add('loading');

      try {
        const res = await fetch(buildUrl(uid));
        const data = await res.json();

        if (data.sent === "0 likes") {
          showPopup("Already Claimed", `This account (UID: ${uid}) already attempted to receive likes today. Come back tomorrow after 04 AM IST to claim free likes again.`);
        } else {
          const formatted = {
            nickname: data.nickname,
            region: data.region,
            level: data.level,
            exp: data.exp,
            "likes already": data.likes_antes,
            after: data.likes_depois,
            sent: data.sent,
          };
          showPopup("Likes Sent!", JSON.stringify(formatted, null, 2));
        }
      } catch (err) {
        showPopup("Error", err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
        submitBtn.classList.remove('loading');
      }
    });
  </script></body>
</html>
