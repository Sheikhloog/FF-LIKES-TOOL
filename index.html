<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sheikh FF Likes</title>
  <style>
    body {
      margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; text-align: center;
    }
    header {
      padding: 20px; font-size: 28px; font-weight: bold; background: #0f3460; color: #fff;
    }
    .container {
      max-width: 400px; margin: 40px auto; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    label {
      display:block; margin: 16px 0 6px; font-weight: bold; text-align: left;
    }
    input, select {
      width: 100%; padding: 12px; border: none; border-radius: 8px; background: #1a1a2e; color: #fff; font-size: 16px;
    }
    button {
      width: 100%; padding: 14px; margin-top: 20px; border: none; border-radius: 8px; background: #e94560; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer;
    }
    button:hover { background: #ff4d6d; }
    pre {
      margin-top: 20px; padding: 12px; background: #0f3460; border-radius: 8px; text-align: left; overflow: auto;
    }
    footer { margin-top: 30px; color: #bbb; font-size: 14px; }
  </style>
</head>
<body>
  <header>Sheikh FF Likes</header>
  <div class="container">
    <label for="uid">Enter Free Fire UID</label>
    <input type="text" id="uid" placeholder="e.g. 123456789"><label for="region">Select Region</label>
<select id="region">
  <option value="PK">PK</option>
  <option value="BD">BD</option>
  <option value="IND">IND</option>
  <option value="BR">BR</option>
  <option value="SG">SG</option>
  <option value="ID">ID</option>
  <option value="ME">ME</option>
  <option value="NA">NA</option>
  <option value="US">US</option>
</select>

<button id="sendBtn">Send 100 Likes</button>

<pre id="output">Response will appear here...</pre>

  </div>
  <footer>Powered by Sheikh FF Likes | Free Fire Tool</footer>  <script>
    const sendBtn = document.getElementById('sendBtn');
    const output = document.getElementById('output');
    const API_BASE = '';

    function buildUrl(uid, region) {
      const base = API_BASE ? `${API_BASE}/likes` : 'https://likes.ffgarena.cloud/api/v2/likes';
      return `${base}?uid=${uid}&amount_of_likes=100&auth=trial-7d®ion=${region}`;
    }

    sendBtn.addEventListener('click', async () => {
      const uid = document.getElementById('uid').value.trim();
      const region = document.getElementById('region').value.trim();

      if (!uid || !/^\d{6,}$/.test(uid)) {
        alert('Enter a valid UID');
        return;
      }

      output.textContent = 'Sending request...';
      try {
        const url = buildUrl(uid, region);
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        output.textContent = `Error: ${err}\nIf you see CORS errors, use the built-in Node.js proxy.`;
      }
    });
  </script>  <!--
  =====================
  Node.js Proxy (Optional)
  =====================
  Save this as server.js, run with `node server.js`
  =====================

  import express from 'express';
  import fetch from 'node-fetch';

  const app = express();
  const PORT = process.env.PORT || 3000;

  app.get('/likes', async (req, res) => {
    try {
      const { uid, region } = req.query;
      if (!uid || !region) return res.status(400).json({ error: 'uid and region required' });
      const url = `https://likes.ffgarena.cloud/api/v2/likes?uid=${encodeURIComponent(uid)}&amount_of_likes=100&auth=trial-7d&region=${encodeURIComponent(region)}`;
      const r = await fetch(url);
      const data = await r.json();
      res.set('Access-Control-Allow-Origin', '*');
      res.json(data);
    } catch (err) {
      res.status(500).json({ error: 'proxy_failed', message: String(err) });
    }
  });

  app.listen(PORT, () => console.log(`Proxy running on ${PORT}`));

  --></body>
</html>
