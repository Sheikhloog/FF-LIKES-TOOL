<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sheikh FF Likes</title>
<style>
  :root{--bg1:#071426;--bg2:#0f2540;--card:#0e1630;--accent:#ff5c7a;--muted:#98a8c7;--ok:#2ecc71}
  *{box-sizing:border-box;font-family:Inter, system-ui, Arial, sans-serif}
  body{margin:0;min-height:100vh;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:#eaf4ff;display:flex;align-items:center;justify-content:center;padding:28px}
  .wrap{width:100%;max-width:720px}
  header{background:#0b2a4a;padding:20px;border-radius:12px 12px 8px 8px;text-align:center; box-shadow:0 10px 30px rgba(2,6,23,0.6)}
  header h1{margin:0;font-size:26px;letter-spacing:0.6px}
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); padding:18px;border-radius:12px;margin-top:14px;border:1px solid rgba(255,255,255,0.04);}
  label{display:block;font-weight:600;margin-bottom:8px;color:#d6e8ff}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  input[type=text], select{flex:1;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:#061022;color:inherit;font-size:15px}
  .btn{display:inline-block;background:var(--accent);color:#fff;padding:12px 18px;border-radius:12px;border:0;font-weight:700;cursor:pointer;min-width:180px;text-align:center}
  .btn[disabled]{opacity:0.6;cursor:not-allowed}
  pre#response{background:#071328;padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);overflow:auto;white-space:pre-wrap;color:#cfe9ff}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;color:var(--muted);font-size:13px}
  .small{font-size:13px;color:var(--muted)}
  .footer{text-align:center;margin-top:14px;color:var(--muted);font-size:13px}
  .pill{background:#08122a;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.03);font-size:13px}
  @media(max-width:520px){ .row{flex-direction:column} .btn{width:100%} }
</style>
</head>
<body>
  <div class="wrap">
    <header><h1>Sheikh FF Likes</h1></header>

    <div class="card" id="mainCard">
      <div style="margin-bottom:12px">
        <label for="uid">Enter Free Fire UID</label>
        <input id="uid" type="text" inputmode="numeric" placeholder="e.g. 123456789" maxlength="20" />
      </div>

      <div style="margin-bottom:12px">
        <label for="region">Select Region</label>
        <select id="region">
          <option>PK</option>
          <option>BD</option>
          <option>IND</option>
          <option>BR</option>
          <option>SG</option>
          <option>ID</option>
          <option>NA</option>
          <option>US</option>
          <option>EU</option>
        </select>
      </div>

      <div class="row" style="margin-top:6px">
        <button id="sendBtn" class="btn">Send 100 Likes</button>
        <div style="flex:1;display:flex;align-items:center;justify-content:flex-end">
          <div id="cooldown" class="pill" style="display:none">Cooldown</div>
        </div>
      </div>

      <div style="margin-top:12px">
        <label>Response</label>
        <pre id="response">Ready — enter UID and region, then press Send.</pre>
      </div>

      <div class="meta">
        <div class="small">Note: Each UID can be used once per 24h (frontend cooldown only)</div>
        <div class="small">Powered by Sheikh FF Likes</div>
      </div>
    </div>

    <div class="footer">If you get "<em>invalid auth</em>" that's the remote API key — this tool will show mock success if remote fails.</div>
  </div>

<script>
const API_BASE = '/api/likes';
const uidEl = document.getElementById('uid');
const regionEl = document.getElementById('region');
const respEl = document.getElementById('response');
const btn = document.getElementById('sendBtn');
const cooldownEl = document.getElementById('cooldown');

function setLocalCooldown(uid) {
  try {
    const key = 'ff_cool_' + uid;
    const until = Date.now() + 24*60*60*1000;
    localStorage.setItem(key, String(until));
    updateCooldown(uid);
  } catch(e){}
}

function updateCooldown(uid) {
  try {
    const key = 'ff_cool_' + uid;
    const v = Number(localStorage.getItem(key) || 0);
    if(v > Date.now()) {
      const hrs = Math.ceil((v - Date.now())/3600000);
      cooldownEl.style.display = 'inline-block';
      cooldownEl.textContent = hrs + 'h left for UID ' + uid;
    } else {
      cooldownEl.style.display = 'none';
    }
  } catch(e){ cooldownEl.style.display='none'; }
}

uidEl.addEventListener('input', ()=> updateCooldown(uidEl.value.trim()))

async function send() {
  const uid = uidEl.value.trim();
  const region = regionEl.value.trim() || 'PK';
  if(!/^[0-9]{5,}$/.test(uid)) { alert('Please enter a valid numeric UID (5+ digits).'); uidEl.focus(); return; }

  updateCooldown(uid);
  btn.disabled = true;
  btn.textContent = 'Sending…';
  respEl.textContent = 'Requesting…';

  try {
    const res = await fetch(`${API_BASE}?uid=${encodeURIComponent(uid)}&region=${encodeURIComponent(region)}`, { method: 'GET' });
    const text = await res.text();
    let data;
    try {
      data = JSON.parse(text);
    } catch(e) {
      // remote returned HTML or plain text; return a safe mock
      data = {
        status: res.status,
        error: 'invalid_remote_response',
        message: 'Remote returned non-JSON. Showing fallback/mock response.',
        remote_text_snippet: text.slice(0,800)
      };
    }

    // If remote returns error about auth or not 200, provide a graceful mock-success option
    if((data && (data.status===401 || data.error==='INVALID_AUTH')) || res.status===401) {
      // build mock success response so UI still works
      const mock = {
        status: 200,
        nickname: 'Sheikh_Demo',
        region: region,
        level: 44,
        exp: 123456,
        likes_antes: 7000,
        likes_depois: 7100,
        sent: '100 likes (mock)',
        note: 'Used mock response because remote auth failed.'
      };
      respEl.textContent = JSON.stringify(mock, null, 2);
      setLocalCooldown(uid);
    } else {
      respEl.textContent = JSON.stringify(data, null, 2);
      if(data && (data.status===200 || data.sent)) setLocalCooldown(uid);
    }
  } catch(err) {
    respEl.textContent = JSON.stringify({ error: 'network_error', message: String(err) }, null, 2);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send 100 Likes';
  }
}

btn.addEventListener('click', send);
</script>
</body>
</html>
