<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Free Fire Likes Tool</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: linear-gradient(145deg, #1e293b, #111827);
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #22d3ee;
      --accent-2: #38bdf8;
      --danger: #ef4444;
      --success: #22c55e;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .card {
      background: var(--card);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 5px;
    }
    h1 img {
      width: 40px;
      margin-right: 10px;
    }
    p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 1rem;
      outline: none;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }
    input:focus, select:focus {
      box-shadow: 0 0 8px var(--accent);
      transform: scale(1.02);
    }
    button {
      background: var(--accent);
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    button:active {
      transform: scale(0.98);
    }
    .popup {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      max-width: 90%;
      text-align: center;
      animation: slideDown 0.5s ease;
    }
    @keyframes slideDown {
      from {opacity: 0; transform: translate(-50%, -30px);}
      to {opacity: 1; transform: translate(-50%, 0);}
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Garena_logo.png/600px-Garena_logo.png" alt="Garena">Free Fire Likes Tool</h1>
    <p>Powered by Sheikh Zada</p>
    <input type="text" id="uid" placeholder="Enter UID e.g. 12345678">
    <select id="server">
      <option value="PK">Pakistan</option>
      <option value="IN">India</option>
      <option value="NP">Nepal</option>
      <option value="BD">Bangladesh</option>
      <option value="BR">Brazil</option>
      <option value="SG">Singapore</option>
    </select>
    <button id="submit">Submit</button>
    <div id="response"></div>
  </div>
  <script>
    document.getElementById('submit').addEventListener('click', async () => {
      const uid = document.getElementById('uid').value;
      const server = document.getElementById('server').value;
      if (!uid) return alert('Please enter a UID');

      const resBox = document.getElementById('response');
      resBox.innerHTML = 'Loading...';

      try {
        const response = await fetch(`https://likes.ffgarena.cloud/api/v2/likes?uid=${uid}&amount_of_likes=100&auth=trial-7d&region=${server}`);
        const data = await response.json();
        if (data.status === 200) {
          resBox.innerHTML = `<div class='popup'>Nickname: ${data.nickname}<br>Region: ${data.region}<br>Likes Already: ${data.likes_antes}<br>Likes After: ${data.likes_depois}</div>`;
        } else if (data.status === 404) {
          resBox.innerHTML = `<div class='popup'>This account (UID: ${uid}) already attempted to receive likes today. Come back tomorrow after 04 AM IST to claim free likes again.</div>`;
        } else {
          resBox.innerHTML = `<div class='popup'>Error: ${data.message}</div>`;
        }
      } catch (err) {
        resBox.innerHTML = `<div class='popup'>Error fetching data. Try again later.</div>`;
      }
    });
  </script>
</body>
</html>
